# Sales-Pilot 一体化编排（PostgreSQL + API + 前端 + Nginx）
# 镜像基础：PostgreSQL/Node/Go 构建链为 Bookworm；运行期 API 使用 UBI9 micro

services:
  db:
    image: postgres:17-bookworm
    environment:
      POSTGRES_USER: sales
      POSTGRES_PASSWORD: sales
      POSTGRES_DB: sales_pilot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sales -d sales_pilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgres://sales:sales@db:5432/sales_pilot?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-please-change-me}
      # 对外访问基址（OIDC redirect 等，经 Nginx 时勿写容器内 8080）
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost}
      GIN_MODE: release
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ""
    environment:
      NODE_ENV: production
    depends_on:
      - backend

  nginx:
    image: nginx:1.26-bookworm
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
