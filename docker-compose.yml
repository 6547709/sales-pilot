# Sales-Pilot 开发/生产环境 Docker Compose
# 基于 gin-vue-admin 架构：Go + Gin 后端 + Vue + Element Plus 前端 + PostgreSQL + Redis

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sales_pilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8888:8888"
    environment:
      # Viper 配置文件路径
      CONFIG_FILE: config.yaml
    volumes:
      # 挂载本地代码便于开发时热重载
      - ./server:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      NODE_ENV: production
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      - server
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
