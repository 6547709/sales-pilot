# NAS / 生产：全部使用公网镜像（GHCR 应用镜像 + Docker Hub 官方 PostgreSQL）
# 注意：当前 GitHub Actions 仅构建 linux/amd64；若在 ARM NAS 上部署，需自行构建/推送 arm64 镜像或改用 amd64 主机。
# 使用前在同级目录创建 .env（或导出环境变量），至少设置 JWT_SECRET。
#
# 必填/常用变量：
#   GHCR_OWNER     GitHub 用户名（小写），与 ghcr.io/<owner>/... 一致，默认 6547709
#   IMAGE_TAG      镜像标签，与 CI 推送一致，如 0.1.42、latest、sha-xxx
#   JWT_SECRET     务必改为强随机串
#   APP_BASE_URL   浏览器访问根地址，如 http://192.168.1.10 或 https://app.example.com
#   FRONTEND_ORIGIN 与 APP_BASE_URL 通常相同（CORS）
#   HTTP_PORT      宿主机 HTTP 端口，默认 80

services:
  db:
    image: postgres:17-bookworm
    environment:
      POSTGRES_USER: sales
      POSTGRES_PASSWORD: sales
      POSTGRES_DB: sales_pilot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sales -d sales_pilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/${GHCR_OWNER:-6547709}/sales-pilot-backend:${IMAGE_TAG:-latest}
    environment:
      DATABASE_URL: postgres://sales:sales@db:5432/sales_pilot?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-please-change-me}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost}
      GIN_MODE: release
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/${GHCR_OWNER:-6547709}/sales-pilot-frontend:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
    depends_on:
      - backend

  nginx:
    image: ghcr.io/${GHCR_OWNER:-6547709}/sales-pilot-nginx:${IMAGE_TAG:-latest}
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
