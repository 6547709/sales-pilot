# Docker 部署配置
# 使用 docker-compose 时，挂载此文件覆盖 config.yaml

jwt:
    signing-key: qmPlus-docker
    expires-time: 7d
    buffer-time: 1d
    issuer: qmPlus

zap:
    level: info
    format: console
    prefix: "[gin-vue-admin]"
    director: log
    show-line: true
    encode-level: LowercaseColorLevelEncoder
    stacktrace-key: stacktrace
    log-in-console: true
    retention-day: -1

redis:
    useCluster: false
    addr: redis:6379
    password: ""
    db: 0

redis-list:
    - name: cache
      useCluster: false
      addr: redis:6379
      password: ""
      db: 0

system:
    env: public
    addr: 8888
    db-type: pgsql
    oss-type: local
    use-redis: true
    use-mongo: false
    use-multipoint: false
    iplimit-count: 15000
    iplimit-time: 3600
    router-prefix: ""
    use-strict-auth: false
    disable-auto-migrate: false

captcha:
    key-long: 6
    img-width: 240
    img-height: 80
    open-captcha: 0
    open-captcha-timeout: 3600

pgsql:
    path: postgres
    port: "5432"
    config: ""
    db-name: sales_pilot
    username: postgres
    password: postgres
    max-idle-conns: 10
    max-open-conns: 100
    log-mode: info
    log-zap: false

local:
    path: uploads/file
    store-path: uploads/file

autocode:
    web: web/src
    root: ""
    server: server
    module: 'github.com/flipped-aurora/gin-vue-admin/server'
    ai-path: ""

excel:
    dir: ./resource/excel/

disk-list:
    - mount-point: "/"

cors:
    mode: strict-whitelist
    whitelist:
        - allow-origin: "*"
          allow-headers: Content-Type,AccessToken,X-CSRF-Token,Authorization,Token,X-Token,X-User-Id
          allow-methods: POST,GET
          expose-headers: Content-Length, Access-Control-Allow-Origin, Access-Control-Allow-Headers, Content-Type
          allow-credentials: true
