# 在 GitHub Actions 中构建 linux/amd64 + linux/arm64 镜像并推送到 GHCR（无需本地 docker build）
# 版本号：0.1.<run_number>（本工作流每次运行 +1）+ sha-<短提交> + main 分支打 latest
name: Docker publish (GHCR)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

# 同一 ref 上多次推送时，只保留最新一次运行（避免排队）
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: 仓库 owner 小写（镜像名规范）
        run: echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: 镜像标签与元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/sales-pilot-backend
          tags: |
            type=raw,value=0.1.${{ github.run_number }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: 构建并推送 backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 写入摘要
        run: |
          echo "## sales-pilot-backend" >> "$GITHUB_STEP_SUMMARY"
          echo "- 版本标签: \`0.1.${{ github.run_number }}\`（本工作流第 ${{ github.run_number }} 次运行）" >> "$GITHUB_STEP_SUMMARY"
          echo "- 镜像: \`${{ env.REGISTRY }}/${{ env.OWNER_LC }}/sales-pilot-backend\`" >> "$GITHUB_STEP_SUMMARY"

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: 仓库 owner 小写（镜像名规范）
        run: echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: 镜像标签与元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/sales-pilot-frontend
          tags: |
            type=raw,value=0.1.${{ github.run_number }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: 构建并推送 frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 写入摘要
        run: |
          echo "## sales-pilot-frontend" >> "$GITHUB_STEP_SUMMARY"
          echo "- 版本标签: \`0.1.${{ github.run_number }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- 镜像: \`${{ env.REGISTRY }}/${{ env.OWNER_LC }}/sales-pilot-frontend\`" >> "$GITHUB_STEP_SUMMARY"

  build-nginx:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: 仓库 owner 小写（镜像名规范）
        run: echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: 镜像标签与元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/sales-pilot-nginx
          tags: |
            type=raw,value=0.1.${{ github.run_number }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: 构建并推送 nginx（内嵌 default.conf）
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 写入摘要
        run: |
          echo "## sales-pilot-nginx" >> "$GITHUB_STEP_SUMMARY"
          echo "- 版本标签: \`0.1.${{ github.run_number }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- 镜像: \`${{ env.REGISTRY }}/${{ env.OWNER_LC }}/sales-pilot-nginx\`" >> "$GITHUB_STEP_SUMMARY"
